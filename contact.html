<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Formation&Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Montserrat', sans-serif;
    }
  </style>
</head>
<body class="bg-white text-[#3B578F]">

  <!-- Header -->
  <header class="bg-[#1677E6] text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">FORMATION&FLOW</h1>
    <nav>
      <ul class="flex gap-6 text-sm font-semibold">
        <li><a href="home.html" class="hover:underline">Home</a></li>
        <li><a href="blogentry1.html" class="hover:underline">Blog</a></li>
        <li><a href="about.html" class="hover:underline">About</a></li>
        <li><a href="contact.html" class="hover:underline">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contact Form -->
  <main class="p-6 max-w-xl mx-auto">
    <h2 class="text-3xl font-bold mb-6 text-center">Contact Us</h2>
    <form id="contactForm" onsubmit="return validateContactForm()" class="space-y-4">
      <div>
        <label for="name" class="block font-semibold">Name</label>
        <input type="text" id="name" name="name" class="w-full border border-gray-300 rounded-md px-4 py-2" required />
      </div>
      <div>
        <label for="email" class="block font-semibold">Email</label>
        <input type="email" id="email" name="email" class="w-full border border-gray-300 rounded-md px-4 py-2" required />
      </div>
      <div>
        <label for="message" class="block font-semibold">Message</label>
        <textarea id="message" name="message" rows="5" class="w-full border border-gray-300 rounded-md px-4 py-2" required></textarea>
      </div>
      <button type="submit" class="bg-[#E58802] hover:bg-[#E6B109] text-white font-bold px-6 py-2 rounded-md">Send Message</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-[#1677E6] text-white text-center py-4 mt-10">
    <p>&copy; 2025 Formation&Flow</p>
  </footer>

  <!-- JavaScript for contact form validation -->
  <script>
    function validateContactForm() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!name || !email || !message) {
        alert("Please fill in all fields.");
        return false;
      }

      if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return false;
      }

      alert("Thank you for your message!");
      return true;
    }
  </script>
</body>
</html>
